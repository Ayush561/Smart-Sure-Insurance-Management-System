spring.application.name=api-gateway
server.port=8888
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:9999

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Routes for microservices
# --------------------------------------------------------------

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth-service/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/auth-service/(?<remaining>.*), /${remaining}

# Policy Service
spring.cloud.gateway.routes[1].id=policy-service
spring.cloud.gateway.routes[1].uri=lb://policy-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/policy-service/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/policy-service/(?<remaining>.*), /${remaining}
spring.cloud.gateway.routes[1].filters[1]=CircuitBreaker=policyServiceGateway,fallbackUri=forward:/fallback/policy-service

# Claims Service
spring.cloud.gateway.routes[2].id=claims-service
spring.cloud.gateway.routes[2].uri=lb://claims-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/claims-service/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/claims-service/(?<remaining>.*), /${remaining}
spring.cloud.gateway.routes[2].filters[1]=CircuitBreaker=claimsServiceGateway,fallbackUri=forward:/fallback/claims-service

# Admin Service
spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=lb://admin-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/admin-service/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/admin-service/(?<remaining>.*), /${remaining}

# Payment Service
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/payment-service/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/payment-service/(?<remaining>.*), /${remaining}
spring.cloud.gateway.routes[4].filters[1]=CircuitBreaker=paymentServiceGateway,fallbackUri=forward:/fallback/payment-service

# Add Secret Header to all routed requests
spring.cloud.gateway.default-filters[0]=AddRequestHeader=X-Gateway-Secret, SmartSureSecretKey2026

# Global CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET, POST, PUT, DELETE, OPTIONS, PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# JWT Secret (same key used across all services)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# Logging
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.file.name=logs/api-gateway.log

# Swagger Aggregation from all services in Eureka
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Policy Service
springdoc.swagger-ui.urls[1].url=/policy-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Claims Service
springdoc.swagger-ui.urls[2].url=/claims-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/admin-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Payment Service
springdoc.swagger-ui.urls[4].url=/payment-service/v3/api-docs
# Resilience4j Configuration
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s

# Timeouts for Resilience4j
resilience4j.timelimiter.configs.default.timeoutDuration=30s

# Gateway Timeout for individual routes
spring.cloud.gateway.httpclient.connect-timeout=30000
spring.cloud.gateway.httpclient.response-timeout=30s

# Monitoring (Actuator & Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

