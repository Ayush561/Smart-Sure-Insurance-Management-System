# ==============================================================
# SHARED CONFIGURATION (served to ALL microservices by Config Server)
# ==============================================================

# --------------------------------------------------------------
# Database (PostgreSQL)
# --------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://postgres-db:5432/microservices
spring.datasource.username=postgres
spring.datasource.password=root
# --------------------------------------------------------------
# JPA / Hibernate
# --------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# --------------------------------------------------------------
# Eureka registration
# --------------------------------------------------------------
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# --------------------------------------------------------------
# JWT secret (shared across all services)
# --------------------------------------------------------------
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# --------------------------------------------------------------
# Logging
# --------------------------------------------------------------
logging.level.root=INFO

# --------------------------------------------------------------
# Forwarded Headers (so Swagger uses Gateway URL, not direct port)
# --------------------------------------------------------------
server.forward-headers-strategy=framework

# --------------------------------------------------------------
# Swagger / OpenAPI
# --------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --------------------------------------------------------------
# Razorpay Configuration
# --------------------------------------------------------------
razorpay.key.id=rzp_test_SUGz2hbfTwDAHc
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# --------------------------------------------------------------
# Redis Configuration (Shared)
# --------------------------------------------------------------
spring.data.redis.host=redis
spring.data.redis.port=6379
# spring.data.redis.password= (uncomment and add if needed)
# --------------------------------------------------------------
# Observability (Tracing & Zipkin)
# --------------------------------------------------------------
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
# --------------------------------------------------------------
# Monitoring (Actuator & Prometheus)
# --------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.observations.key-values.application=${spring.application.name}

# --------------------------------------------------------------
# Mail Configuration (Using Gmail)
# --------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ayushans56@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --------------------------------------------------------------
# Brevo (Sendinblue) Configuration
# --------------------------------------------------------------
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=ayushans56@gmail.com
